      - name: Build debug APK
        working-directory: android-build
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p output
          apk_path="$(find android-build/app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          test -n "$apk_path"
          cp "$apk_path" output/CubeDodge-v18-movement-pause-arm64-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubeDodge-v18-Movement-Pause-APK
          path: output/CubeDodge-v18-movement-pause-arm64-debug.apk
          if-no-files-found: error
          retention-days: 30
