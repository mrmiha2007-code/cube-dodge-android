name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-apk:
    name: Cube Dodge arm64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out game files
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;23.2.8568313"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up CMake 3.30.3
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.30.3"

      - name: Prepare raylib Android project
        shell: bash
        run: |
          git clone --depth 1 --branch 5.5.1 --recurse-submodules \
            https://github.com/Bigfoot71/raymob.git android-build

          rm android-build/app/src/main/cpp/main.c
          cp "upload/main(1).cpp" android-build/app/src/main/cpp/main.cpp

          python3 - <<'PY'
          from pathlib import Path
          import re

          properties_path = Path("android-build/gradle.properties")
          properties = properties_path.read_text(encoding="utf-8")
          replacements = {
              "projectName=raymob": "projectName=CubeDodgeAndroid",
              "app.name=raymob": "app.name=Cube Dodge",
              "app.native_library_name=raymob": "app.native_library_name=cube_dodge",
              "app.application_id=com.raylib.raymob": "app.application_id=com.example.cubedodge",
              "app.version_name=1.0": "app.version_name=18.0-movement-pause",
              "app.version_code=1": "app.version_code=18",
              "app.orientation=landscape": "app.orientation=landscape",
              "display.keep_on=true": "display.keep_on=true",
              "display.immersive=true": "display.immersive=true",
              "display.into_cutout=true": "display.into_cutout=false",
              "requirements.vibration=false": "requirements.vibration=true",
          }
          for old, new in replacements.items():
              if old not in properties:
                  raise RuntimeError(f"Expected raymob property was not found: {old}")
              properties = properties.replace(old, new, 1)
          properties_path.write_text(properties, encoding="utf-8")

          gradle_path = Path("android-build/app/build.gradle")
          gradle = gradle_path.read_text(encoding="utf-8")
          compile_sdk_pattern = r"(?m)^([ \t]*)compileSdk[ \t]+\d+[ \t]*$"
          compile_sdk_match = re.search(compile_sdk_pattern, gradle)
          if not compile_sdk_match:
              raise RuntimeError("Expected compileSdk setting was not found")
          indent = compile_sdk_match.group(1)
          gradle = re.sub(
              compile_sdk_pattern,
              f'{indent}compileSdk 34\n{indent}ndkVersion "23.2.8568313"',
              gradle,
              count=1,
          )
          default_config_pattern = r"(?m)^([ \t]*)defaultConfig[ \t]*\{[ \t]*$"
          default_config_match = re.search(default_config_pattern, gradle)
          if not default_config_match:
              raise RuntimeError("Expected defaultConfig block was not found")
          indent = default_config_match.group(1)
          child_indent = indent + "    "
          gradle = re.sub(
              default_config_pattern,
              (f"{indent}defaultConfig {{\n{child_indent}ndk {{\n"
               f"{child_indent}    abiFilters 'arm64-v8a'\n{child_indent}}}"),
              gradle,
              count=1,
          )
          gradle_path.write_text(gradle, encoding="utf-8")

          native_loader_path = Path(
              "android-build/app/src/main/java/com/raylib/raymob/NativeLoader.java"
          )
          native_loader = native_loader_path.read_text(encoding="utf-8")
          on_create_marker = "super.onCreate(savedInstanceState);"
          if on_create_marker not in native_loader:
              raise RuntimeError("NativeLoader onCreate marker was not found")
          native_loader = native_loader.replace(
              on_create_marker,
              on_create_marker
              + "\n        com.example.cubedodge.HapticBridge.start(this);",
              1,
          )

          on_resume_marker = "protected void onResume() {\n        super.onResume();"
          if on_resume_marker not in native_loader:
              raise RuntimeError("NativeLoader onResume marker was not found")
          native_loader = native_loader.replace(
              on_resume_marker,
              on_resume_marker
              + "\n        com.example.cubedodge.HapticBridge.resume(this);",
              1,
          )

          on_pause_marker = "protected void onPause() {\n        super.onPause();"
          if on_pause_marker not in native_loader:
              raise RuntimeError("NativeLoader onPause marker was not found")
          native_loader = native_loader.replace(
              on_pause_marker,
              on_pause_marker
              + "\n        com.example.cubedodge.HapticBridge.pause();",
              1,
          )

          native_methods_marker = "    private native void onAppStart();"
          if native_methods_marker not in native_loader:
              raise RuntimeError("NativeLoader native methods marker was not found")
          native_loader = native_loader.replace(
              native_methods_marker,
              """    @Override
              protected void onDestroy() {
                  com.example.cubedodge.HapticBridge.stop();
                  super.onDestroy();
              }

          """ + native_methods_marker,
              1,
          )
          native_loader_path.write_text(native_loader, encoding="utf-8")

          manifest_path = Path("android-build/app/src/main/AndroidManifest.xml")
          manifest = manifest_path.read_text(encoding="utf-8")
          usb_feature_marker = (
              '    <uses-feature android:glEsVersion="${GL_VERSION_CODE}" '
              'android:required="true" />'
          )
          if usb_feature_marker not in manifest:
              raise RuntimeError("AndroidManifest OpenGL feature marker was not found")
          manifest = manifest.replace(
              usb_feature_marker,
              usb_feature_marker
              + '\n\n    <uses-feature android:name="android.hardware.usb.host" '
              'android:required="false" />',
              1,
          )
          manifest_path.write_text(manifest, encoding="utf-8")

          haptic_bridge_path = Path(
              "android-build/app/src/main/java/com/example/cubedodge/HapticBridge.java"
          )
          haptic_bridge_path.parent.mkdir(parents=True, exist_ok=True)
          haptic_bridge_path.write_text(r'''package com.example.cubedodge;

          import android.app.Activity;
          import android.content.Context;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.os.VibratorManager;
          import android.view.InputDevice;

          public final class HapticBridge {
              private static final int HAPTIC_LIFE_LOST = 1;
              private static final int HAPTIC_ULTIMATE = 2;
              private static final int TRIGGER_PULSE_ULTIMATE = 1;
              private static final long POLL_INTERVAL_MS = 16L;
              private static final Handler HANDLER = new Handler(Looper.getMainLooper());

              private static Activity activity;
              private static boolean running;

              private HapticBridge() {}

              private static native int consumeHapticEvent();
              private static native boolean isUltimateReady();
              private static native int consumeAdaptiveTriggerPulse();

              public static void start(Activity owner) {
                  activity = owner;
                  DualSenseUsb.start(owner);
                  if (!running) {
                      running = true;
                      HANDLER.post(POLL_EVENTS);
                  }
              }

              public static void resume(Activity owner) {
                  start(owner);
              }

              public static void pause() {
                  running = false;
                  HANDLER.removeCallbacks(POLL_EVENTS);
                  DualSenseUsb.pause();
              }

              public static void stop() {
                  pause();
                  DualSenseUsb.stop();
                  activity = null;
              }

              private static final Runnable POLL_EVENTS = new Runnable() {
                  @Override
                  public void run() {
                      if (!running || activity == null) return;

                      int event = 0;
                      int triggerPulse = 0;
                      boolean ultimateReady = false;
                      try {
                          event = consumeHapticEvent();
                          triggerPulse = consumeAdaptiveTriggerPulse();
                          ultimateReady = isUltimateReady();
                      } catch (UnsatisfiedLinkError ignored) {
                          //The native library can still be starting during the first frame.
                      }

                      if (event == HAPTIC_LIFE_LOST || event == HAPTIC_ULTIMATE) {
                          //При прямом USB-захвате Android больше не видит моторы
                          //через InputDevice, поэтому сначала отправляем вибрацию
                          //в том же DualSense output report. Телефон остаётся fallback.
                          if (!DualSenseUsb.playHaptic(event)) playHaptic(event);
                      }
                      DualSenseUsb.update(
                              ultimateReady,
                              triggerPulse == TRIGGER_PULSE_ULTIMATE
                      );
                      HANDLER.postDelayed(this, POLL_INTERVAL_MS);
                  }
              };

              private static void playHaptic(int event) {
                  InputDevice controller = findController();
                  if (controller != null && vibrateController(controller, event)) return;

                  //Some Android builds expose controller input but hide its motors.
                  //In that case the phone gives feedback instead of doing nothing.
                  vibratePhone(event);
              }

              private static InputDevice findController() {
                  for (int deviceId : InputDevice.getDeviceIds()) {
                      InputDevice device = InputDevice.getDevice(deviceId);
                      if (device == null) continue;

                      int sources = device.getSources();
                      boolean isGamepad = (sources & InputDevice.SOURCE_GAMEPAD)
                              == InputDevice.SOURCE_GAMEPAD;
                      boolean isJoystick = (sources & InputDevice.SOURCE_JOYSTICK)
                              == InputDevice.SOURCE_JOYSTICK;
                      if (isGamepad || isJoystick) return device;
                  }
                  return null;
              }

              private static boolean vibrateController(InputDevice controller, int event) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      VibratorManager manager = controller.getVibratorManager();
                      int[] vibratorIds = manager.getVibratorIds();
                      if (vibratorIds.length == 0) return false;

                      for (int i = 0; i < vibratorIds.length; i++) {
                          manager.getVibrator(vibratorIds[i]).vibrate(createEffect(event, i));
                      }
                      return true;
                  }

                  Vibrator vibrator = controller.getVibrator();
                  if (vibrator == null || !vibrator.hasVibrator()) return false;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      vibrator.vibrate(createEffect(event, 0));
                  } else {
                      vibrator.vibrate(event == HAPTIC_LIFE_LOST ? 90L : 420L);
                  }
                  return true;
              }

              private static void vibratePhone(int event) {
                  if (activity == null) return;

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      VibratorManager manager = (VibratorManager) activity.getSystemService(
                              Context.VIBRATOR_MANAGER_SERVICE
                      );
                      if (manager != null) {
                          manager.getDefaultVibrator().vibrate(createEffect(event, 0));
                      }
                  } else {
                      Vibrator vibrator = (Vibrator) activity.getSystemService(
                              Context.VIBRATOR_SERVICE
                      );
                      if (vibrator == null || !vibrator.hasVibrator()) return;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          vibrator.vibrate(createEffect(event, 0));
                      } else {
                          vibrator.vibrate(event == HAPTIC_LIFE_LOST ? 90L : 420L);
                      }
                  }
              }

              private static VibrationEffect createEffect(int event, int motorIndex) {
                  if (event == HAPTIC_LIFE_LOST) {
                      int amplitude = motorIndex == 0 ? 70 : 95;
                      return VibrationEffect.createOneShot(90L, amplitude);
                  }

                  long[] timings = { 0L, 70L, 35L, 110L, 30L, 180L };
                  int heavy = motorIndex == 0 ? 255 : 220;
                  int[] amplitudes = { 0, 145, 0, 205, 0, heavy };
                  return VibrationEffect.createWaveform(timings, amplitudes, -1);
              }
          }
          ''', encoding="utf-8")

          dualsense_usb_path = Path(
              "android-build/app/src/main/java/com/example/cubedodge/DualSenseUsb.java"
          )
          dualsense_usb_path.write_text(r'''package com.example.cubedodge;

          import android.app.Activity;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.hardware.usb.UsbConstants;
          import android.hardware.usb.UsbDevice;
          import android.hardware.usb.UsbDeviceConnection;
          import android.hardware.usb.UsbEndpoint;
          import android.hardware.usb.UsbInterface;
          import android.hardware.usb.UsbManager;
          import android.hardware.usb.UsbRequest;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Toast;

          import java.nio.ByteBuffer;
          import java.util.HashMap;

          final class DualSenseUsb {
              private static final String ACTION_USB_PERMISSION =
                      "com.example.cubedodge.USB_PERMISSION";
              private static final int SONY_VENDOR_ID = 0x054c;
              private static final int DUALSENSE_PRODUCT_ID = 0x0ce6;

              private static final int TRIGGER_OFF = 0;
              private static final int TRIGGER_READY = 1;
              private static final int TRIGGER_ULTIMATE = 2;
              private static final int HAPTIC_OFF = 0;
              private static final int HAPTIC_LIFE_LOST = 1;
              private static final int HAPTIC_ULTIMATE = 2;
              private static final long ULTIMATE_TRIGGER_MS = 280L;
              private static final Handler HANDLER = new Handler(Looper.getMainLooper());

              private static Activity activity;
              private static UsbManager usbManager;
              private static PendingIntent permissionIntent;
              private static BroadcastReceiver usbReceiver;
              private static UsbDevice usbDevice;
              private static volatile UsbDeviceConnection connection;
              private static UsbInterface hidInterface;
              private static UsbEndpoint inputEndpoint;
              private static UsbEndpoint outputEndpoint;
              private static volatile UsbRequest activeRequest;
              private static Thread usbThread;
              private static volatile boolean usbThreadRunning;
              private static volatile int requestedTriggerState = TRIGGER_OFF;
              private static volatile int sentTriggerState = -1;
              private static volatile int requestedHapticState = HAPTIC_OFF;
              private static volatile int sentHapticState = -1;
              private static int appliedState = -1;
              private static int effectGeneration;
              private static int hapticGeneration;
              private static boolean desiredReady;
              private static boolean ultimateEffectActive;
              private static volatile boolean writeBlocked;
              private static boolean started;

              private DualSenseUsb() {}

              private static native void updateNativeGamepad(
                      boolean connected, int buttons, int leftX, int leftY,
                      int leftTrigger, int rightTrigger
              );

              static void start(Activity owner) {
                  activity = owner;
                  if (!started) {
                      started = true;
                      usbManager = (UsbManager) owner.getSystemService(Context.USB_SERVICE);

                      Intent permission = new Intent(ACTION_USB_PERMISSION)
                              .setPackage(owner.getPackageName());
                      int pendingFlags = PendingIntent.FLAG_UPDATE_CURRENT;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          pendingFlags |= PendingIntent.FLAG_IMMUTABLE;
                      }
                      permissionIntent = PendingIntent.getBroadcast(
                              owner, 0, permission, pendingFlags
                      );

                      usbReceiver = new BroadcastReceiver() {
                          @Override
                          public void onReceive(Context context, Intent intent) {
                              String action = intent.getAction();
                              UsbDevice device = getUsbDevice(intent);

                              if (ACTION_USB_PERMISSION.equals(action)) {
                                  boolean granted = intent.getBooleanExtra(
                                          UsbManager.EXTRA_PERMISSION_GRANTED, false
                                  );
                                  if (granted && isDualSense(device)) {
                                      openDevice(device);
                                  } else if (!granted && isDualSense(device)) {
                                      showStatus("DualSense USB: доступ не разрешён");
                                  }
                              } else if (UsbManager.ACTION_USB_DEVICE_ATTACHED.equals(action)) {
                                  scanForDualSense();
                              } else if (UsbManager.ACTION_USB_DEVICE_DETACHED.equals(action) &&
                                      sameDevice(device, usbDevice)) {
                                  resetAndClose();
                              }
                          }
                      };

                      IntentFilter filter = new IntentFilter(ACTION_USB_PERMISSION);
                      filter.addAction(UsbManager.ACTION_USB_DEVICE_ATTACHED);
                      filter.addAction(UsbManager.ACTION_USB_DEVICE_DETACHED);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                          owner.registerReceiver(
                                  usbReceiver, filter, Context.RECEIVER_EXPORTED
                          );
                      } else {
                          owner.registerReceiver(usbReceiver, filter);
                      }
                  }
                  scanForDualSense();
              }

              static void update(boolean ready, boolean ultimatePulse) {
                  desiredReady = ready;
                  if (connection == null || writeBlocked) return;

                  if (ultimatePulse) {
                      ultimateEffectActive = true;
                      final int generation = ++effectGeneration;
                      applyState(TRIGGER_ULTIMATE);
                      HANDLER.postDelayed(new Runnable() {
                          @Override
                          public void run() {
                              if (generation != effectGeneration) return;
                              ultimateEffectActive = false;
                              applyState(desiredReady ? TRIGGER_READY : TRIGGER_OFF);
                          }
                      }, ULTIMATE_TRIGGER_MS);
                      return;
                  }

                  if (!ultimateEffectActive) {
                      applyState(ready ? TRIGGER_READY : TRIGGER_OFF);
                  }
              }

              static boolean playHaptic(int event) {
                  if (connection == null || !usbThreadRunning || writeBlocked) return false;
                  if (event != HAPTIC_LIFE_LOST && event != HAPTIC_ULTIMATE) return false;

                  requestedHapticState = event;
                  final int generation = ++hapticGeneration;
                  long duration = event == HAPTIC_LIFE_LOST ? 90L : 420L;
                  HANDLER.postDelayed(new Runnable() {
                      @Override
                      public void run() {
                          if (generation != hapticGeneration) return;
                          requestedHapticState = HAPTIC_OFF;
                      }
                  }, duration);
                  return true;
              }

              static void pause() {
                  desiredReady = false;
                  ultimateEffectActive = false;
                  effectGeneration += 1;
                  HANDLER.removeCallbacksAndMessages(null);
                  hapticGeneration += 1;
                  requestedHapticState = HAPTIC_OFF;
                  if (connection != null && usbThreadRunning) {
                      requestedTriggerState = TRIGGER_OFF;
                      appliedState = TRIGGER_OFF;
                  }
              }

              static void stop() {
                  pause();
                  resetAndClose();
                  if (activity != null && usbReceiver != null) {
                      try {
                          activity.unregisterReceiver(usbReceiver);
                      } catch (IllegalArgumentException ignored) {
                          //Receiver was already removed by Android.
                      }
                  }
                  usbReceiver = null;
                  permissionIntent = null;
                  usbManager = null;
                  activity = null;
                  started = false;
              }

              private static void scanForDualSense() {
                  if (usbManager == null || connection != null) return;

                  HashMap<String, UsbDevice> devices = usbManager.getDeviceList();
                  for (UsbDevice device : devices.values()) {
                      if (!isDualSense(device)) continue;

                      if (usbManager.hasPermission(device)) {
                          openDevice(device);
                      } else if (permissionIntent != null) {
                          usbManager.requestPermission(device, permissionIntent);
                      }
                      return;
                  }
              }

              private static void openDevice(UsbDevice device) {
                  if (usbManager == null || !isDualSense(device) ||
                          !usbManager.hasPermission(device)) return;
                  resetAndClose();

                  UsbInterface targetInterface = findGamepadInterface(device);
                  if (targetInterface == null) {
                      showStatus("DualSense USB: HID-интерфейс не найден");
                      return;
                  }

                  UsbEndpoint targetInput = findEndpoint(
                          targetInterface, UsbConstants.USB_DIR_IN
                  );
                  UsbEndpoint targetOutput = findEndpoint(
                          targetInterface, UsbConstants.USB_DIR_OUT
                  );
                  if (targetInput == null || targetOutput == null) {
                      showStatus("DualSense USB: interrupt endpoints не найдены");
                      return;
                  }

                  UsbDeviceConnection opened = usbManager.openDevice(device);
                  if (opened == null) {
                      showStatus("DualSense USB: устройство не открылось");
                      return;
                  }

                  //force=true отключает системный HID-драйвер от интерфейса.
                  //После этого ввод читает наш USB worker, поэтому кнопки не теряются.
                  if (!opened.claimInterface(targetInterface, true)) {
                      opened.close();
                      showStatus("DualSense USB: не удалось захватить HID-интерфейс");
                      return;
                  }

                  usbDevice = device;
                  connection = opened;
                  hidInterface = targetInterface;
                  inputEndpoint = targetInput;
                  outputEndpoint = targetOutput;
                  appliedState = -1;
                  writeBlocked = false;
                  requestedTriggerState = desiredReady ? TRIGGER_READY : TRIGGER_OFF;
                  sentTriggerState = -1;
                  requestedHapticState = HAPTIC_OFF;
                  sentHapticState = -1;
                  startUsbThread(opened, targetInput, targetOutput);
              }

              private static UsbInterface findGamepadInterface(UsbDevice device) {
                  for (int i = 0; i < device.getInterfaceCount(); i++) {
                      UsbInterface candidate = device.getInterface(i);
                      if (candidate.getInterfaceClass() == UsbConstants.USB_CLASS_HID) {
                          return candidate;
                      }
                  }
                  return null;
              }

              private static UsbEndpoint findEndpoint(UsbInterface target, int direction) {
                  for (int i = 0; i < target.getEndpointCount(); i++) {
                      UsbEndpoint endpoint = target.getEndpoint(i);
                      if (endpoint.getDirection() == direction &&
                              endpoint.getType() == UsbConstants.USB_ENDPOINT_XFER_INT) {
                          return endpoint;
                      }
                  }
                  return null;
              }

              private static void applyState(int state) {
                  if (connection == null || !usbThreadRunning || writeBlocked ||
                          state == appliedState) return;
                  requestedTriggerState = state;
                  appliedState = state;
              }

              private static byte[] createOutputReport(int triggerState, int hapticState) {
                  //Полный проводной output report DualSense: ID 0x02 + 62 байта.
                  byte[] report = new byte[63];
                  report[0] = 0x02;
                  report[1] = 0x0c; //right-trigger + left-trigger update flags
                  fillTriggerEffect(report, 11, triggerState);
                  fillTriggerEffect(report, 22, triggerState);

                  if (hapticState != HAPTIC_OFF) {
                      //Compatible vibration + haptics select; байты 3/4 —
                      //высокочастотный и низкочастотный моторы DualSense.
                      report[1] |= 0x03;
                      if (hapticState == HAPTIC_LIFE_LOST) {
                          report[3] = 70;
                          report[4] = 95;
                      } else {
                          report[3] = (byte)200;
                          report[4] = (byte)255;
                      }
                  }
                  return report;
              }

              private static void fillTriggerEffect(byte[] report, int offset, int state) {
                  if (state == TRIGGER_OFF) {
                      report[offset] = 0x05;
                  } else if (state == TRIGGER_READY) {
                      //Feedback mode: mild resistance from zone 3 to the end.
                      report[offset] = 0x21;
                      int activeZones = 0;
                      int strengthZones = 0;
                      int encodedStrength = 2; //strength 3 encoded as strength - 1
                      for (int zone = 3; zone < 10; zone++) {
                          activeZones |= 1 << zone;
                          strengthZones |= encodedStrength << (3*zone);
                      }
                      report[offset + 1] = (byte)(activeZones & 0xff);
                      report[offset + 2] = (byte)((activeZones >> 8) & 0xff);
                      report[offset + 3] = (byte)(strengthZones & 0xff);
                      report[offset + 4] = (byte)((strengthZones >> 8) & 0xff);
                      report[offset + 5] = (byte)((strengthZones >> 16) & 0xff);
                      report[offset + 6] = (byte)((strengthZones >> 24) & 0xff);
                  } else if (state == TRIGGER_ULTIMATE) {
                      //Weapon mode: strong wall between zones 2 and 7.
                      report[offset] = 0x25;
                      int startStopZones = (1 << 2) | (1 << 7);
                      report[offset + 1] = (byte)(startStopZones & 0xff);
                      report[offset + 2] = (byte)((startStopZones >> 8) & 0xff);
                      report[offset + 3] = 0x07; //strength 8 encoded as strength - 1
                  }
              }

              private static void startUsbThread(
                      final UsbDeviceConnection workerConnection,
                      final UsbEndpoint workerInput,
                      final UsbEndpoint workerOutput
              ) {
                  usbThreadRunning = true;
                  publishNativeGamepad(true, 0, 128, 128, 0, 0);
                  usbThread = new Thread(new Runnable() {
                      @Override
                      public void run() {
                          runUsbLoop(workerConnection, workerInput, workerOutput);
                      }
                  }, "DualSenseUsbWorker");
                  usbThread.start();
              }

              private static void runUsbLoop(
                      UsbDeviceConnection workerConnection,
                      UsbEndpoint workerInput,
                      UsbEndpoint workerOutput
              ) {
                  UsbRequest inputRequest = new UsbRequest();
                  UsbRequest outputRequest = new UsbRequest();
                  boolean inputInitialized = inputRequest.initialize(
                          workerConnection, workerInput
                  );
                  boolean outputInitialized = outputRequest.initialize(
                          workerConnection, workerOutput
                  );

                  if (!inputInitialized || !outputInitialized) {
                      writeBlocked = true;
                      usbThreadRunning = false;
                      showStatus("DualSense USB: UsbRequest не инициализирован");
                      if (inputInitialized) inputRequest.close();
                      if (outputInitialized) outputRequest.close();
                      publishNativeGamepad(false, 0, 128, 128, 0, 0);
                      scheduleResetAfterFailure(workerConnection);
                      return;
                  }

                  ByteBuffer inputBuffer = ByteBuffer.allocateDirect(64);
                  ByteBuffer outputBuffer = ByteBuffer.allocateDirect(63);
                  boolean connectionAnnounced = false;
                  boolean failed = false;

                  try {
                      while (usbThreadRunning && connection == workerConnection) {
                          int requestedState = requestedTriggerState;
                          int requestedHaptic = requestedHapticState;
                          if (requestedState != sentTriggerState ||
                                  requestedHaptic != sentHapticState) {
                              int outputResult = writeOutputReport(
                                      workerConnection, outputRequest,
                                      outputBuffer, requestedState, requestedHaptic
                              );
                              if (outputResult != 63) {
                                  writeBlocked = true;
                                  failed = true;
                                  showStatus("DualSense USB: ошибка USB OUT " + outputResult);
                                  break;
                              }
                              sentTriggerState = requestedState;
                              sentHapticState = requestedHaptic;
                              if (!connectionAnnounced) {
                                  connectionAnnounced = true;
                                  showStatus("Cube Dodge v18: USB-ввод, вибрация и триггеры подключены");
                              }
                          }

                          inputBuffer.clear();
                          activeRequest = inputRequest;
                          if (!queueRequest(inputRequest, inputBuffer, 64)) {
                              activeRequest = null;
                              failed = true;
                              showStatus("DualSense USB: ошибка очереди USB IN");
                              break;
                          }

                          UsbRequest completed = workerConnection.requestWait();
                          activeRequest = null;
                          if (!usbThreadRunning || connection != workerConnection) break;
                          if (completed != inputRequest) continue;

                          int length = inputBuffer.position();
                          if (length > 0) publishInputReport(inputBuffer, length);
                      }
                  } catch (RuntimeException error) {
                      if (usbThreadRunning) {
                          failed = true;
                          showStatus("DualSense USB: поток ввода остановлен");
                      }
                  } finally {
                      usbThreadRunning = false;
                      activeRequest = null;
                      inputRequest.close();
                      outputRequest.close();
                      publishNativeGamepad(false, 0, 128, 128, 0, 0);
                      if (failed) scheduleResetAfterFailure(workerConnection);
                  }
              }

              private static int writeOutputReport(
                      UsbDeviceConnection workerConnection,
                      UsbRequest request,
                      ByteBuffer buffer,
                      int triggerState,
                      int hapticState
              ) {
                  byte[] report = createOutputReport(triggerState, hapticState);
                  buffer.clear();
                  buffer.put(report);
                  buffer.flip();

                  activeRequest = request;
                  if (!queueRequest(request, buffer, report.length)) {
                      activeRequest = null;
                      return -2;
                  }
                  UsbRequest completed = workerConnection.requestWait();
                  activeRequest = null;
                  if (completed != request) return -3;
                  return buffer.position();
              }

              @SuppressWarnings("deprecation")
              private static boolean queueRequest(
                      UsbRequest request, ByteBuffer buffer, int length
              ) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      return request.queue(buffer);
                  }
                  return request.queue(buffer, length);
              }

              private static void publishInputReport(ByteBuffer report, int length) {
                  if (length < 11 || (report.get(0) & 0xff) != 0x01) return;

                  int leftX = report.get(1) & 0xff;
                  int leftY = report.get(2) & 0xff;
                  int leftTrigger = report.get(5) & 0xff;
                  int rightTrigger = report.get(6) & 0xff;
                  int buttons0 = report.get(8) & 0xff;
                  int buttons1 = report.get(9) & 0xff;
                  int buttons2 = report.get(10) & 0xff;
                  int buttons = 0;

                  int hat = buttons0 & 0x0f;
                  if (hat == 0 || hat == 1 || hat == 7) buttons |= 1 << 0;
                  if (hat == 3 || hat == 4 || hat == 5) buttons |= 1 << 1;
                  if (hat == 5 || hat == 6 || hat == 7) buttons |= 1 << 2;
                  if (hat == 1 || hat == 2 || hat == 3) buttons |= 1 << 3;

                  if ((buttons0 & 0x10) != 0) buttons |= 1 << 4;  //Square
                  if ((buttons0 & 0x20) != 0) buttons |= 1 << 5;  //Cross
                  if ((buttons0 & 0x40) != 0) buttons |= 1 << 6;  //Circle
                  if ((buttons0 & 0x80) != 0) buttons |= 1 << 7;  //Triangle
                  if ((buttons1 & 0x01) != 0) buttons |= 1 << 8;  //L1
                  if ((buttons1 & 0x02) != 0) buttons |= 1 << 9;  //R1
                  if ((buttons1 & 0x04) != 0) buttons |= 1 << 10; //L2
                  if ((buttons1 & 0x08) != 0) buttons |= 1 << 11; //R2
                  if ((buttons1 & 0x10) != 0) buttons |= 1 << 12; //Create
                  if ((buttons1 & 0x20) != 0) buttons |= 1 << 13; //Options
                  if ((buttons1 & 0x40) != 0) buttons |= 1 << 14; //L3
                  if ((buttons1 & 0x80) != 0) buttons |= 1 << 15; //R3
                  if ((buttons2 & 0x01) != 0) buttons |= 1 << 16; //PS
                  if ((buttons2 & 0x02) != 0) buttons |= 1 << 17; //Touchpad

                  publishNativeGamepad(
                          true, buttons, leftX, leftY, leftTrigger, rightTrigger
                  );
              }

              private static void publishNativeGamepad(
                      boolean connected, int buttons, int leftX, int leftY,
                      int leftTrigger, int rightTrigger
              ) {
                  try {
                      updateNativeGamepad(
                              connected, buttons, leftX, leftY,
                              leftTrigger, rightTrigger
                      );
                  } catch (UnsatisfiedLinkError ignored) {
                      //Native library can still be starting during Activity creation.
                  }
              }

              private static void stopUsbThread() {
                  usbThreadRunning = false;
                  UsbRequest request = activeRequest;
                  if (request != null) {
                      try {
                          request.cancel();
                      } catch (RuntimeException ignored) {
                          //The connection may already be gone after physical detach.
                      }
                  }

                  Thread thread = usbThread;
                  if (thread != null && thread != Thread.currentThread()) {
                      try {
                          thread.join(180L);
                      } catch (InterruptedException ignored) {
                          Thread.currentThread().interrupt();
                      }
                  }
                  usbThread = null;
                  activeRequest = null;
                  publishNativeGamepad(false, 0, 128, 128, 0, 0);
              }

              private static void scheduleResetAfterFailure(
                      final UsbDeviceConnection failedConnection
              ) {
                  Activity owner = activity;
                  if (owner == null) return;
                  owner.runOnUiThread(new Runnable() {
                      @Override
                      public void run() {
                          if (connection == failedConnection) resetAndClose();
                      }
                  });
              }

              private static void showStatus(String message) {
                  Activity owner = activity;
                  if (owner == null) return;
                  owner.runOnUiThread(new Runnable() {
                      @Override
                      public void run() {
                          Toast.makeText(owner, message, Toast.LENGTH_SHORT).show();
                      }
                  });
              }

              private static void sendFinalTriggerOff(
                      UsbDeviceConnection opened, UsbInterface claimedInterface
              ) {
                  if (opened == null || claimedInterface == null) return;
                  byte[] fullReport = createOutputReport(TRIGGER_OFF, HAPTIC_OFF);
                  byte[] payload = new byte[47];
                  System.arraycopy(fullReport, 1, payload, 0, payload.length);
                  opened.controlTransfer(
                          0x21, 0x09, 0x0202, claimedInterface.getId(),
                          payload, payload.length, 80
                  );
              }

              private static void resetAndClose() {
                  UsbDeviceConnection opened = connection;
                  UsbInterface claimedInterface = hidInterface;
                  requestedTriggerState = TRIGGER_OFF;
                  stopUsbThread();
                  if (opened != null) {
                      try {
                          sendFinalTriggerOff(opened, claimedInterface);
                      } catch (RuntimeException ignored) {
                          //Physical detach can invalidate the file descriptor immediately.
                      }
                      if (claimedInterface != null) {
                          try {
                              opened.releaseInterface(claimedInterface);
                          } catch (RuntimeException ignored) {
                              //Nothing remains to release after a detached cable.
                          }
                      }
                      opened.close();
                  }
                  connection = null;
                  usbDevice = null;
                  hidInterface = null;
                  inputEndpoint = null;
                  outputEndpoint = null;
                  appliedState = -1;
                  sentTriggerState = -1;
                  requestedHapticState = HAPTIC_OFF;
                  sentHapticState = -1;
                  writeBlocked = false;
                  ultimateEffectActive = false;
                  effectGeneration += 1;
                  hapticGeneration += 1;
              }

              private static boolean isDualSense(UsbDevice device) {
                  return device != null &&
                          device.getVendorId() == SONY_VENDOR_ID &&
                          device.getProductId() == DUALSENSE_PRODUCT_ID;
              }

              private static boolean sameDevice(UsbDevice left, UsbDevice right) {
                  return left != null && right != null &&
                          left.getDeviceId() == right.getDeviceId();
              }

              @SuppressWarnings("deprecation")
              private static UsbDevice getUsbDevice(Intent intent) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      return intent.getParcelableExtra(UsbManager.EXTRA_DEVICE, UsbDevice.class);
                  }
                  return intent.getParcelableExtra(UsbManager.EXTRA_DEVICE);
              }
          }
